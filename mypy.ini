# Mirrors Robot-Pathfinding-Core's [tool.mypy] but non-strict and scoped.
#
# Core type-checks its whole package under --strict. Here, rclpy and the
# generated ROS message packages ship incomplete type information, so a
# workspace-wide strict run is mostly noise. We therefore type-check only the
# pure-logic seam to Core (the grid adapter), where typing carries real value.
[mypy]
python_version = 3.12
files = src/robot_pathfinding_nav/robot_pathfinding_nav/grid_adapter.py
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
disallow_untyped_defs = true
no_implicit_optional = true
