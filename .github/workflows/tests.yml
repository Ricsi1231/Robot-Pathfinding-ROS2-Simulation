name: Tests

on:
  workflow_call:

jobs:
  test:
    name: ROS 2 Jazzy
    runs-on: ubuntu-latest
    # ros-base pins the distro's Python (3.12) and bundles colcon + rosdep, so no
    # Python matrix is needed (unlike Core). The base image is intentionally lean,
    # so pip / git are installed via apt below.
    container: ros:jazzy-ros-base

    steps:
      - uses: actions/checkout@v4

      - name: Install system build tools (pip, colcon, git, pytest)
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            python3-pip git python3-colcon-common-extensions python3-pytest

      - name: Install dev tooling and the Core library
        # pytest comes from apt above so it shares the distro's pluggy (pip can't
        # uninstall apt-managed packages). pre-commit is a local git-hook tool and
        # is not needed in CI, so only ruff + mypy are pip-installed here.
        run: |
          python3 -m pip install --break-system-packages --no-cache-dir ruff mypy
          python3 -m pip install --break-system-packages --no-cache-dir \
            "git+https://github.com/Ricsi1231/Robot-Pathfinding-Core.git"

      - name: Resolve ROS dependencies (rosdep)
        run: |
          rosdep update
          rosdep install --from-paths src --ignore-src -r -y

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy

      - name: Build (colcon)
        shell: bash
        run: |
          source /opt/ros/jazzy/setup.bash
          colcon build --symlink-install

      - name: Test (pytest)
        shell: bash
        # Run pytest directly rather than `colcon test`: colcon's ament_python
        # test step falls back to the unittest runner, which does not collect
        # plain pytest-style test functions (it reports "Ran 0 tests", exit 5).
        # Sourcing install/setup.bash puts the built packages on PYTHONPATH so
        # the node/adapter imports resolve. Mirrors Core, whose `make test` is pytest.
        run: |
          source /opt/ros/jazzy/setup.bash
          source install/setup.bash
          pytest src
